<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy Voice Proto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #050507 0%, #040306 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .chat-box {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 6px;
            word-wrap: break-word;
            max-width: 90%;
        }

        .message.user {
            background: #0a0c12;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.ai {
            background: #e0e0e0;
            color: #333;
            margin-right: auto;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            font-size: 13px;
            text-align: center;
            margin: 0 auto;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #0d0f1b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #010102;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .status {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }

        .listening {
            color: #28a745;
            font-weight: 600;
        }

        .error {
            color: #dc3545;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎤 Buddy Voice</h1>
        <p class="subtitle">Talk to Buddy powered by Groq AI</p>

        <div class="chat-box" id="chatBox"></div>

        <div class="controls">
            <button class="btn-primary" id="voiceBtn">🎤 Speak</button>
            <button class="btn-secondary" id="clearBtn">Clear</button>
        </div>

        <div class="input-group">
            <input type="text" id="textInput" placeholder="Or type your message...">
            <button class="btn-primary" id="sendBtn">Send</button>
        </div>

        <div class="status" id="status">Ready to chat</div>
    </div>

    <script>
        const API_ENDPOINT = '/api/chat';

        // DOM Elements
        const chatBox = document.getElementById('chatBox');
        const voiceBtn = document.getElementById('voiceBtn');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const textInput = document.getElementById('textInput');
        const status = document.getElementById('status');

        // Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        let conversationHistory = [];
        let audioQueue = Promise.resolve();

        // Initialize
        function addMessage(text, type = 'user') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        function updateStatus(text, isError = false) {
            status.textContent = text;
            status.className = isError ? 'status error' : 'status';
        }

        async function playAudio(url) {
            const audio = new Audio(url);
            return new Promise(resolve => {
                audio.onended = resolve;
                audio.onerror = resolve;
                audio.play().catch(e => {
                    console.error('Playback failed:', e);
                    resolve();
                });
            });
        }

        async function speakWithGroqTTS(text) {
            const cleanText = text.trim();
            if (!cleanText) return;

            // Sequential audio queue
            audioQueue = audioQueue.then(async () => {
                try {
                    updateStatus('Buddy is talking (Groq Orpheus)...');
                    const response = await fetch('/api/proxy-tts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: cleanText })
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        await playAudio(url);
                        URL.revokeObjectURL(url);
                        return;
                    } else {
                        const errData = await response.json();
                        console.error('Groq TTS Failed:', errData.error);
                        if (errData.error.includes('terms acceptance')) {
                            updateStatus('ERROR: Accept Groq terms in console!', true);
                        } else {
                            updateStatus('Groq TTS Error', true);
                        }
                    }
                } catch (err) {
                    console.error('Groq TTS unreachable:', err);
                    updateStatus('Backend offline', true);
                }
            });
            return audioQueue;
        }

        async function sendMessage(text) {
            if (!text.trim()) return;

            addMessage(text, 'user');
            conversationHistory.push({ role: 'user', content: text });

            textInput.value = '';
            updateStatus('Thinking...');
            voiceBtn.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                // Streaming Reader
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';

                const msgDiv = addMessage('', 'ai');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    fullResponse += chunk;

                    // Update UI live
                    msgDiv.textContent = fullResponse;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                // Send the COMPLETE response to TTS at once
                if (fullResponse.trim()) {
                    await speakWithGroqTTS(fullResponse);
                }

                conversationHistory.push({ role: 'assistant', content: fullResponse });
                updateStatus('Ready to chat');

            } catch (error) {
                updateStatus(`Error: ${error.message}`, true);
                addMessage(`Error: ${error.message}`, 'system');
            } finally {
                voiceBtn.disabled = false;
                sendBtn.disabled = false;
            }
        }

        // Event Listeners
        voiceBtn.addEventListener('click', () => {
            recognition.start();
            updateStatus('Listening...', false);
            voiceBtn.disabled = true;
        });

        recognition.addEventListener('result', (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            if (transcript) {
                textInput.value = transcript;
                sendMessage(transcript);
            }
        });

        recognition.addEventListener('error', (event) => {
            updateStatus(`Voice error: ${event.error}`, true);
            voiceBtn.disabled = false;
        });

        recognition.addEventListener('end', () => {
            voiceBtn.disabled = false;
        });

        sendBtn.addEventListener('click', () => {
            sendMessage(textInput.value);
        });

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage(textInput.value);
            }
        });

        clearBtn.addEventListener('click', () => {
            chatBox.innerHTML = '';
            textInput.value = '';
            conversationHistory = [];
            audioQueue = Promise.resolve();
            updateStatus('Ready to chat');
        });

        // Check Web Speech API support
        if (!SpeechRecognition) {
            updateStatus('Web Speech API not supported', true);
            voiceBtn.disabled = true;
        }
    </script>
</body>

</html>
